version: 2

models:
  - name: fct_player_match
    description: >
      One row per player appearance per game. Combines all player match stats
      from int_player_match_stats with game context from int_games_info.
      Joined on game_id. Date and season are sourced from int_player_match_stats.
    config:
      materialized: table
    columns:
      - name: appearance_id
        description: Primary key. Unique identifier for the player appearance.
        tests:
          - unique
          - not_null

      - name: game_id
        description: Unique identifier for the game.
        tests:
          - not_null

      - name: player_id
        description: Unique identifier for the player.
        tests:
          - not_null

      - name: player_name
        description: Full name of the player.

      - name: player_club_id
        description: Identifier of the club the player represented in this appearance.

      - name: player_current_club_id
        description: Identifier of the club the player currently belongs to.

      - name: date
        description: Date the match was played (yyyy-mm-dd). Sourced from int_player_match_stats.

      - name: season
        description: >
          Season derived from the match date in YY/YY format (e.g. 23/24).
          Sourced from int_player_match_stats.

      - name: competition_id
        description: Unique identifier for the competition. Sourced from int_games_info.

      - name: round
        description: Round or matchday of the game within the competition.

      - name: stadium
        description: Name of the stadium where the game was played.

      - name: attendance
        description: Number of spectators attending the game.

      - name: competition_type
        description: Type of competition (e.g. domestic league, cup, international).

      - name: yellow_cards
        description: Number of yellow cards received by the player in this appearance.

      - name: red_cards
        description: Number of red cards received by the player in this appearance.

      - name: goals
        description: Number of goals scored by the player in this appearance.

      - name: assists
        description: Number of assists made by the player in this appearance.

      - name: minutes_played
        description: Number of minutes played by the player in this appearance.